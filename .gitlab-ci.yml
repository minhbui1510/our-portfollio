image: node:20

stages:
  - build
  - deploy

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

before_script:
  - npm ci --cache .npm --prefer-offline

build_app:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

deploy_firebase:
  stage: deploy
  only:
    - main
  dependencies:
    - build_app
  script:
    - npm install -g firebase-tools
    - firebase deploy --only hosting --token "$FIREBASE_DEPLOY_TOKEN"
