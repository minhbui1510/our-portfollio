server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files directly
    location /assets {
        try_files $uri =404;
    }

    # For any route, try the requested URI or fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}